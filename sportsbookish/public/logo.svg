<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.3" r="0.85">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded-square background (iOS-style mask compatible) -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="180" ry="180" fill="url(#glow)"/>

  <!-- Axes (subtle) -->
  <path d="M 230 230 V 794 H 794" fill="none" stroke="#10b981" stroke-opacity="0.25" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Rising line chart with peaks: 4 points climbing left → right -->
  <path d="M 280 660 L 430 520 L 560 600 L 690 380 L 780 310"
        fill="none"
        stroke="#10b981"
        stroke-width="48"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#shadow)"/>

  <!-- Data point dots at each vertex -->
  <g fill="#10b981" filter="url(#shadow)">
    <circle cx="280" cy="660" r="26"/>
    <circle cx="430" cy="520" r="26"/>
    <circle cx="560" cy="600" r="26"/>
    <circle cx="690" cy="380" r="26"/>
    <circle cx="780" cy="310" r="26"/>
  </g>

  <!-- Wordmark "ISH" — small emerald accent in lower-right -->
  <text x="864" y="900" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="92" font-weight="800" fill="#10b981" text-anchor="end" letter-spacing="-2">ISH</text>
</svg>
