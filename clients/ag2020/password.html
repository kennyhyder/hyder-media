<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Auto Glass 2020 Dashboard</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #1B4B82;
            --accent-light: #6BA4D0;
            --danger: #ef4444;
            --border: #475569;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-container { width: 100%; max-width: 420px; padding: 20px; }
        .login-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 40px 36px;
            text-align: center;
        }
        .logo { margin-bottom: 18px; }
        .logo img { height: 40px; width: auto; }
        h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 22px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label {
            display: block; font-size: 0.8rem; color: var(--text-secondary);
            margin-bottom: 6px; font-weight: 500;
        }
        .form-group input {
            width: 100%; padding: 12px 14px;
            background: var(--bg-tertiary); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-primary); font-size: 1rem;
            outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: var(--accent-light); }
        .alert {
            padding: 11px 14px; border-radius: 8px;
            font-size: 0.85rem; margin-bottom: 16px; display: none;
            text-align: left; line-height: 1.4;
            background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: #fca5a5;
        }
        .alert.show { display: block; }
        .btn {
            width: 100%; padding: 12px 22px;
            background: var(--accent-light); color: white; border: none;
            border-radius: 8px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .btn:hover { background: #4f8db8; }
        .footer-text { margin-top: 22px; font-size: 0.78rem; color: var(--text-secondary); }
        .footer-text a { color: var(--accent-light); text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <img src="logo.webp" alt="Auto Glass 2020" onerror="this.style.display='none'">
            </div>
            <h1>Financial Dashboard</h1>
            <p class="subtitle">Enter the team password to continue</p>

            <div class="alert" id="alert-error"></div>

            <form id="password-form">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required autofocus>
                </div>
                <button type="submit" class="btn">Enter Dashboard</button>
            </form>

            <p class="footer-text">
                Prepared by <a href="https://hyder.me" target="_blank" rel="noopener">Hyder Media</a>
            </p>
        </div>
    </div>

    <script>
        (function () {
            var AUTH_KEY = 'ag2020_dashboard_auth';
            var AUTH_VALUE = 'authenticated';
            var PASSWORD = 'AG2020FLOW';

            // After-login destination — preserves deep links via `?next=…`
            // (also accepts the pre-Supabase-era `?redirect=…` param).
            // `next` is a bare hash ("#attribution") or a relative filename
            // ("court-presentation.html#foo"); reject anything absolute so the
            // gate can't be used as an open redirect.
            var qs = new URLSearchParams(window.location.search);
            var next = qs.get('next') || qs.get('redirect') || 'index.html';
            if (/^([a-z]+:)?\/\//i.test(next) || next.charAt(0) === '/') next = 'index.html';

            // Already unlocked → straight in.
            try {
                if (sessionStorage.getItem(AUTH_KEY) === AUTH_VALUE) {
                    window.location.replace(next);
                    return;
                }
            } catch (_) {}

            document.getElementById('password-form').addEventListener('submit', function (e) {
                e.preventDefault();
                var input = document.getElementById('password').value;
                if (input === PASSWORD) {
                    try { sessionStorage.setItem(AUTH_KEY, AUTH_VALUE); } catch (_) {}
                    window.location.replace(next);
                } else {
                    var el = document.getElementById('alert-error');
                    el.textContent = 'Incorrect password. Please try again.';
                    el.classList.add('show');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            });
        })();
    </script>
</body>
</html>
