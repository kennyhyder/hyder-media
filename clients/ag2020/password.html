<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Glass 2020 Dashboard | Sign In</title>
    <meta http-equiv="refresh" content="0; url=login.html">
    <script>
        // The shared-password gate has been replaced with Supabase Auth +
        // per-user tab permissions. Forward old bookmarks to login.html and
        // preserve any deep-link query / hash.
        (function() {
            // The previous gate used `?redirect=…` for deep links; the new
            // login.html uses `?next=…`. Translate so old links still work.
            var qs = new URLSearchParams(window.location.search);
            var redirect = qs.get('redirect');
            var next = qs.get('next') || redirect;
            var target = 'login.html';
            if (next) {
                target += '?next=' + encodeURIComponent(next);
            }
            target += window.location.hash || '';
            window.location.replace(target);
        })();
    </script>
</head>
<body>
    <p>Redirecting to <a href="login.html">sign in</a>…</p>
</body>
</html>
