<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Auto Glass 2020 Dashboard</title>
    <script>
        // 2026-07-15: Supabase auth removed (cross-tenant magic-link incident).
        // The dashboard uses the shared password gate at password.html now.
        // Preserve any deep link passed via ?next=.
        (function () {
            var next = new URLSearchParams(window.location.search).get('next');
            window.location.replace('password.html' + (next ? '?next=' + encodeURIComponent(next) : ''));
        })();
    </script>
</head>
<body>
    <p>Redirecting to the dashboard sign-in…</p>
</body>
</html>
