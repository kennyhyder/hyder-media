<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Auto Glass 2020 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #1B4B82;
            --accent-hover: #143b66;
            --accent-light: #6BA4D0;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .login-container { width: 100%; max-width: 460px; padding: 20px; }
        .login-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 40px 36px;
            text-align: center;
        }
        .logo { margin-bottom: 18px; }
        .logo img {
            height: 40px; width: auto;
        }
        h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 22px; }

        .tabs {
            display: flex; gap: 4px; margin-bottom: 22px;
            background: var(--bg-tertiary); padding: 4px; border-radius: 8px;
        }
        .tab-btn {
            flex: 1; padding: 8px 12px; background: transparent;
            border: none; border-radius: 6px;
            color: var(--text-secondary); font-size: 0.85rem; font-weight: 500;
            cursor: pointer; transition: all 0.15s;
        }
        .tab-btn.active {
            background: var(--bg-secondary);
            color: var(--text-primary);
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label {
            display: block; font-size: 0.8rem; color: var(--text-secondary);
            margin-bottom: 6px; font-weight: 500;
        }
        .form-group input {
            width: 100%; padding: 12px 14px;
            background: var(--bg-tertiary); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-primary); font-size: 1rem;
            outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: var(--accent-light); }
        .form-group input::placeholder { color: var(--text-secondary); }

        .alert {
            padding: 11px 14px; border-radius: 8px;
            font-size: 0.85rem; margin-bottom: 16px; display: none;
            text-align: left; line-height: 1.4;
        }
        .alert.show { display: block; }
        .alert.error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: #fca5a5; }
        .alert.info  { background: rgba(27, 75, 130, 0.2); border: 1px solid var(--accent-light); color: var(--text-primary); }

        .btn {
            width: 100%; padding: 12px 22px;
            background: var(--accent-light); color: white; border: none;
            border-radius: 8px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .btn:hover { background: #4f8db8; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            margin-top: 10px;
        }
        .btn-secondary:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        .pane { display: none; }
        .pane.active { display: block; }

        .footer-text { margin-top: 22px; font-size: 0.78rem; color: var(--text-secondary); }
        .footer-text a { color: var(--accent-light); text-decoration: none; }
        .footer-text a:hover { text-decoration: underline; }

        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid currentColor; border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <img src="logo.webp" alt="Auto Glass 2020" onerror="this.style.display='none'">
            </div>
            <h1>Financial Dashboard</h1>
            <p class="subtitle">Sign in to continue</p>

            <div class="alert error" id="alert-error"></div>
            <div class="alert info" id="alert-info"></div>

            <!-- Pane: tab selector + sign-in -->
            <div class="pane active" id="pane-signin">
                <div class="tabs">
                    <button type="button" class="tab-btn active" id="tab-password">Password</button>
                    <button type="button" class="tab-btn" id="tab-magic">Magic Link</button>
                </div>

                <form id="password-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required autofocus>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn" id="password-btn">Sign In</button>
                </form>

                <form id="magic-form" style="display: none;">
                    <div class="form-group">
                        <label for="magic-email">Email</label>
                        <input type="email" id="magic-email" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                    <button type="submit" class="btn" id="magic-btn">Send Magic Link</button>
                    <p class="footer-text" style="margin-top: 12px;">
                        We&rsquo;ll email you a one-click sign-in link.
                    </p>
                </form>
            </div>

            <!-- Pane: set password (after invite/recovery) -->
            <div class="pane" id="pane-set-password">
                <h2 style="font-size: 1.1rem; margin-bottom: 6px;">Set Your Password</h2>
                <p class="subtitle">Choose a password so you can sign in next time without a link.</p>
                <form id="set-password-form">
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" minlength="8" placeholder="At least 8 characters" autocomplete="new-password" required autofocus>
                    </div>
                    <div class="form-group">
                        <label for="new-password-confirm">Confirm Password</label>
                        <input type="password" id="new-password-confirm" minlength="8" placeholder="Re-enter password" autocomplete="new-password" required>
                    </div>
                    <button type="submit" class="btn" id="set-password-btn">Save &amp; Continue</button>
                    <button type="button" class="btn btn-secondary" id="skip-password-btn">Skip for now</button>
                </form>
            </div>

            <p class="footer-text">
                Prepared by <a href="https://hyder.me" target="_blank" rel="noopener">Hyder Media</a>
            </p>
        </div>
    </div>

    <script>
        // -------- URL inspection (run BEFORE the SDK consumes hash/search) --------
        const _initialHash = window.location.hash || '';
        const _initialSearch = window.location.search || '';
        const _initialQS = new URLSearchParams(_initialSearch);
        const _initialHQ = new URLSearchParams(_initialHash.replace(/^#/, ''));
        const _hashType = _initialHQ.get('type');
        const _searchType = _initialQS.get('type');
        const _hasPkceCode = _initialQS.has('code');
        const _authErrorCode = _initialHQ.get('error_code') || _initialQS.get('error_code');
        const _authErrorDesc = _initialHQ.get('error_description') || _initialQS.get('error_description');
        const _isInviteOrRecovery =
            _hashType === 'invite' || _hashType === 'recovery' || _hashType === 'magiclink' ||
            _searchType === 'invite' || _searchType === 'recovery' || _searchType === 'magiclink' ||
            _hasPkceCode;

        const SUPABASE_URL = 'https://ilbovwnhrowvxjdkvrln.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsYm92d25ocm93dnhqZGt2cmxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1MjUzMTIsImV4cCI6MjA4NDEwMTMxMn0.FKtChreOxcemcTUZqbtnk-ZkjqLHYwQFKvx_Xy35FlM';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { detectSessionInUrl: true, flowType: 'pkce', persistSession: true }
        });

        // After-login destination — preserves deep links via `?next=…`
        const NEXT_URL = (function() {
            const next = new URLSearchParams(window.location.search).get('next');
            if (!next) return 'index.html';
            // `next` may be a bare hash ("#attribution") or a filename ("court-presentation.html#foo")
            // — both are safe relative paths from this page.
            return next;
        })();

        const $ = (id) => document.getElementById(id);
        function showPane(id) {
            document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
            $(id).classList.add('active');
        }
        function showError(msg) {
            const el = $('alert-error');
            el.textContent = msg;
            el.classList.add('show');
            $('alert-info').classList.remove('show');
        }
        function showInfo(msg) {
            const el = $('alert-info');
            el.textContent = msg;
            el.classList.add('show');
            $('alert-error').classList.remove('show');
        }
        function clearAlerts() {
            $('alert-error').classList.remove('show');
            $('alert-info').classList.remove('show');
        }
        ['email', 'password', 'magic-email', 'new-password', 'new-password-confirm'].forEach(id => {
            $(id).addEventListener('input', clearAlerts);
        });

        // ---- Tab toggling (password vs magic link) ----
        $('tab-password').addEventListener('click', () => {
            $('tab-password').classList.add('active');
            $('tab-magic').classList.remove('active');
            $('password-form').style.display = '';
            $('magic-form').style.display = 'none';
            $('email').focus();
            clearAlerts();
        });
        $('tab-magic').addEventListener('click', () => {
            $('tab-magic').classList.add('active');
            $('tab-password').classList.remove('active');
            $('magic-form').style.display = '';
            $('password-form').style.display = 'none';
            // Pre-fill from the password tab if user already typed an email
            const e = $('email').value.trim();
            if (e) $('magic-email').value = e;
            $('magic-email').focus();
            clearAlerts();
        });

        // -------- Bootstrap: handle invite/recovery landings + existing session --------
        (async function bootstrap() {
            // Bounced here by auth-check.js after a failed tenant check
            // (signed-in account with no ag2020_users membership row).
            if (_initialQS.get('denied')) {
                showError('This account does not have access to the Auto Glass 2020 dashboard. Ask Kenny or Cash to grant you access, then sign in again.');
                if (window.history?.replaceState) {
                    window.history.replaceState(null, '', window.location.pathname);
                }
                return;
            }
            if (_authErrorCode) {
                const friendly = _authErrorCode === 'otp_expired'
                    ? 'That sign-in link has expired or was already used. Common cause: an email client (Outlook Safe Links / Gmail preview / Resend click tracking) consumed the one-time token before you clicked. Ask Kenny to send a fresh invite, or use the password tab if you\'ve set one.'
                    : (_authErrorDesc || _authErrorCode);
                showError(friendly);
                if (window.history?.replaceState) {
                    window.history.replaceState(null, '', window.location.pathname);
                }
                return;
            }
            if (_hasPkceCode) {
                try {
                    const code = _initialQS.get('code');
                    const { error } = await sb.auth.exchangeCodeForSession(code);
                    if (error && !/code.+used|already.+used|code_verifier/i.test(error.message)) {
                        console.warn('[ag2020-login] PKCE exchange:', error);
                    }
                } catch (e) {
                    console.warn('[ag2020-login] PKCE exchange threw:', e);
                }
            }

            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                if (_isInviteOrRecovery) {
                    showError('That sign-in link has expired or was already used. Please request a new one.');
                }
                return;
            }

            // Session exists.
            if (_isInviteOrRecovery) {
                // Force the user to set a password before forwarding into the dashboard.
                showInfo('Welcome! Set a password (or skip and continue with magic links).');
                showPane('pane-set-password');
                return;
            }
            // Already signed in → go straight in.
            window.location.replace(NEXT_URL);
        })();

        // -------- Password sign-in --------
        $('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlerts();
            const btn = $('password-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Signing in…';
            try {
                const email = $('email').value.trim().toLowerCase();
                const password = $('password').value;
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;
                window.location.replace(NEXT_URL);
            } catch (err) {
                console.error('[ag2020-login] password sign-in error:', err);
                showError(err.message || 'Sign in failed.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });

        // -------- Magic link --------
        $('magic-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlerts();
            const btn = $('magic-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Sending…';
            try {
                const email = $('magic-email').value.trim().toLowerCase();
                const redirectTo = window.location.origin + window.location.pathname +
                    (NEXT_URL && NEXT_URL !== 'index.html' ? '?next=' + encodeURIComponent(NEXT_URL) : '');
                const { error } = await sb.auth.signInWithOtp({
                    email,
                    // shouldCreateUser:true lets new invited users register themselves
                    // via magic-link. AuthGate still blocks dashboard access until an
                    // admin grants them an ag2020_users row.
                    // data.product='ag2020' tells the shared-project auth.users
                    // triggers (9dm_handle_new_user, sb_handle_new_user) that this
                    // signup is NOT for their products — they skip creating their
                    // rows for AG2020 users.
                    options: {
                        emailRedirectTo: redirectTo,
                        shouldCreateUser: true,
                        data: { product: 'ag2020' },
                    },
                });
                if (error) throw error;
                showInfo('Check your inbox — we sent a one-click sign-in link to ' + email + '.');
            } catch (err) {
                console.error('[ag2020-login] magic link error:', err);
                showError(err.message || 'Could not send magic link. Make sure your account exists.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Magic Link';
            }
        });

        // -------- Set password (after invite/recovery) --------
        $('set-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlerts();
            const pwd = $('new-password').value;
            const confirm = $('new-password-confirm').value;
            if (pwd !== confirm) { showError('Passwords do not match.'); return; }
            if (pwd.length < 8)  { showError('Password must be at least 8 characters.'); return; }
            const btn = $('set-password-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Saving…';
            try {
                const { error } = await sb.auth.updateUser({ password: pwd });
                if (error) throw error;
                if (window.history?.replaceState) {
                    window.history.replaceState(null, '', window.location.pathname + window.location.search);
                }
                window.location.replace(NEXT_URL);
            } catch (err) {
                console.error('[ag2020-login] set password error:', err);
                showError(err.message || 'Could not save password.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save & Continue';
            }
        });

        $('skip-password-btn').addEventListener('click', () => {
            // Don't sign out — the user has a valid session, just hop into the dashboard.
            window.location.replace(NEXT_URL);
        });
    </script>
</body>
</html>
