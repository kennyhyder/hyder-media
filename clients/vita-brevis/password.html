<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vita Brevis Fine Art | Access Required</title>
    <style>
        :root {
            --bg-primary: #1a1410;
            --bg-secondary: #2a201a;
            --bg-tertiary: #3a2e26;
            --text-primary: #f5ede0;
            --text-secondary: #a89888;
            --accent: #c9a36a;
            --accent-hover: #d4b27d;
            --success: #7fb069;
            --danger: #c46a5e;
            --border: #4a3c32;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container { width: 100%; max-width: 420px; padding: 20px; }

        .login-card {
            background: var(--bg-secondary);
            border-radius: 4px;
            border: 1px solid var(--border);
            padding: 48px 40px;
            text-align: center;
        }

        .logo { margin-bottom: 24px; }
        .logo img {
            height: 48px;
            width: auto;
            filter: brightness(0) saturate(100%) invert(76%) sepia(36%) saturate(372%) hue-rotate(355deg) brightness(91%) contrast(85%);
        }

        .login-card h1 {
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }

        .login-card .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 32px;
            font-style: italic;
        }

        .form-group { margin-bottom: 24px; text-align: left; }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus { border-color: var(--accent); }
        .form-group input::placeholder { color: var(--text-secondary); }

        .error-message {
            background: rgba(196, 106, 94, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 0.9rem;
            margin-bottom: 24px;
            display: none;
        }
        .error-message.show { display: block; }

        .btn {
            width: 100%;
            padding: 14px 24px;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .footer-text {
            margin-top: 32px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .footer-text a { color: var(--accent); text-decoration: none; }
        .footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <img src="../../assets/imgs/logos/hyder-media-icon.png" alt="Hyder Media">
            </div>
            <h1>Vita Brevis Fine Art</h1>
            <p class="subtitle">Advertising Performance Dashboard</p>

            <div class="error-message" id="error-message">
                Incorrect password. Please try again.
            </div>

            <form id="password-form">
                <div class="form-group">
                    <label for="password">Access Password</label>
                    <input type="password" id="password" name="password" placeholder="Password" autocomplete="off" autofocus>
                </div>
                <button type="submit" class="btn">Enter</button>
            </form>

            <p class="footer-text">
                Prepared by <a href="https://hyder.me" target="_blank">Hyder Media</a>
            </p>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = 'VITABREVIS';
        const AUTH_KEY = 'vita_brevis_dashboard_auth';

        if (sessionStorage.getItem(AUTH_KEY) === 'authenticated') {
            window.location.href = 'reporting.html';
        }

        document.getElementById('password-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            if (password === CORRECT_PASSWORD) {
                sessionStorage.setItem(AUTH_KEY, 'authenticated');
                window.location.href = 'reporting.html';
            } else {
                errorMessage.classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('error-message').classList.remove('show');
        });
    </script>
</body>
</html>
