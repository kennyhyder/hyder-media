<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcon Labs Competitive Intelligence | Access Required</title>
    <link rel="icon" href="assets/falcon-icon.png">
    <link rel="preconnect" href="https://api.fontshare.com">
    <link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0915;
            --bg-secondary: #151221;
            --bg-tertiary: #241f33;
            --text-primary: #fffcf5;
            --text-secondary: #a59fb8;
            --accent: #fe6f50;
            --accent-hover: #f94b25;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #332d45;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Switzer', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse 60% 45% at 50% -5%, rgba(254, 111, 80, 0.16), transparent);
            pointer-events: none;
        }
        .login-container { width: 100%; max-width: 440px; padding: 20px; position: relative; }
        .login-card {
            background: var(--bg-secondary); border-radius: 16px; border: 1px solid var(--border);
            padding: 0 0 40px; text-align: center; overflow: hidden;
        }
        .wordmark { display: block; width: 100%; height: auto; margin-bottom: 32px; }
        .card-inner { padding: 0 40px; }
        .login-card h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        .login-card .subtitle { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 32px; }
        .form-group { margin-bottom: 24px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 14px 16px; background: var(--bg-tertiary); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-primary); font-size: 1rem; outline: none; transition: border-color 0.2s;
            font-family: inherit;
        }
        .form-group input:focus { border-color: var(--accent); }
        .form-group input::placeholder { color: var(--text-secondary); }
        .error-message {
            background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger);
            padding: 12px 16px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 24px; display: none;
        }
        .error-message.show { display: block; }
        .btn {
            width: 100%; padding: 14px 24px; background: var(--accent); color: white; border: none;
            border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
            font-family: inherit;
        }
        .btn:hover { background: var(--accent-hover); }
        .footer-text { margin-top: 32px; font-size: 0.85rem; color: var(--text-secondary); }
        .footer-text a { color: var(--accent); text-decoration: none; }
        .footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img class="wordmark" src="assets/falcon-og.png" alt="Falcon">
            <div class="card-inner">
                <h1>Competitive Intelligence</h1>
                <p class="subtitle">Falcon Labs Paid Search Analysis</p>

                <div class="error-message" id="error-message">
                    Incorrect password. Please try again.
                </div>

                <form id="password-form">
                    <div class="form-group">
                        <label for="password">Enter Access Password</label>
                        <input type="password" id="password" name="password" placeholder="Password" autocomplete="off" autofocus>
                    </div>
                    <button type="submit" class="btn">Access Tools</button>
                </form>

                <p class="footer-text">
                    Prepared by <a href="https://hyder.me" target="_blank">Hyder Media</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = 'THANKYOU';
        const AUTH_KEY = 'falconlabs_ci_auth';

        if (sessionStorage.getItem(AUTH_KEY) === 'authenticated') {
            window.location.href = 'competitive-intel-summary.html';
        }

        document.getElementById('password-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            if (password === CORRECT_PASSWORD) {
                sessionStorage.setItem(AUTH_KEY, 'authenticated');
                window.location.href = 'competitive-intel-summary.html';
            } else {
                errorMessage.classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('error-message').classList.remove('show');
        });
    </script>
</body>
</html>
