<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Moving Checklist · Locked</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e4e4e7}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#111;border:1px solid #1f1f1f;border-radius:12px;padding:32px;max-width:380px;width:100%}
h1{font-size:22px;font-weight:700;margin-bottom:8px}
.sub{color:#9ca3af;font-size:14px;margin-bottom:24px;line-height:1.5}
label{display:block;font-size:12px;color:#9ca3af;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
input{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:12px 14px;color:#e4e4e7;font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none}
input:focus{border-color:#10b981}
.btn{width:100%;background:#10b981;color:#022c22;border:0;border-radius:8px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;font-family:inherit}
.btn:hover{background:#059669}
.err{color:#f87171;font-size:13px;margin-top:10px;display:none}
.err.show{display:block}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>📦 Moving Checklist</h1>
    <p class="sub">Itemized delivery verification — order #100345695. Enter the password to continue.</p>
    <form id="f">
      <label for="pw">Password</label>
      <input id="pw" type="password" autocomplete="off" autocapitalize="off" autocorrect="off" autofocus required>
      <button type="submit" class="btn">Unlock</button>
      <div id="err" class="err">Wrong password.</div>
    </form>
  </div>
</div>
<script>
const PW = 'KAUAI';
const KEY = 'moving_checklist_auth_2026';
if (sessionStorage.getItem(KEY) === '1') location.replace('app/');
document.getElementById('f').addEventListener('submit', e => {
  e.preventDefault();
  const v = document.getElementById('pw').value.trim();
  if (v === PW) {
    sessionStorage.setItem(KEY, '1');
    location.replace('app/');
  } else {
    document.getElementById('err').classList.add('show');
    document.getElementById('pw').value = '';
  }
});
</script>
</body>
</html>
