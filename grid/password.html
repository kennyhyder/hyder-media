<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridScout - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            padding: 48px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .logo svg { color: #7c3aed; }
        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #7c3aed;
        }
        .subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
            text-align: left;
        }
        .form-group input {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }
        .form-group input:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgb(124 58 237 / 0.1);
        }
        .error {
            color: #dc2626;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .btn {
            width: 100%;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 8px;
        }
        .btn:hover { background: #6d28d9; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #9ca3af;
        }
        .footer a { color: #7c3aed; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            <h1>GridScout</h1>
        </div>
        <p class="subtitle">Transmission Infrastructure Intelligence</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="password">Access Code</label>
                <input type="password" id="password" placeholder="Enter access code" autofocus>
                <div class="error" id="error">Invalid access code. Please try again.</div>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>

        <div class="footer">
            Powered by <a href="https://hyder.me">Hyder Media</a>
        </div>
    </div>

    <script>
        const AUTH_KEY = 'gridscout_auth';
        const PASSWORD = 'GRIDSCOUT';

        // Already authenticated? Redirect to dashboard
        const currentAuth = sessionStorage.getItem(AUTH_KEY);
        if (currentAuth === 'authenticated') {
            window.location.href = '/grid/';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const input = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('error');

            if (input === PASSWORD) {
                sessionStorage.setItem(AUTH_KEY, 'authenticated');
                const params = new URLSearchParams(window.location.search);
                window.location.href = params.get('return') || '/grid/';
                return;
            }

            errorEl.textContent = 'Invalid access code.';
            errorEl.style.display = 'block';
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        });
    </script>
</body>
</html>
