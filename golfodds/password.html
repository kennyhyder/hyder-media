<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GolfOdds — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ededed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: #171717;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .logo span { font-size: 28px; }
        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #22c55e;
        }
        .subtitle {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #d4d4d4;
            margin-bottom: 6px;
            text-align: left;
        }
        .form-group input {
            width: 100%;
            background: #0a0a0a;
            color: #ededed;
            border: 1px solid #404040;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgb(34 197 94 / 0.1);
        }
        .error {
            color: #f87171;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .btn {
            width: 100%;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn:hover { background: #15803d; }
        .footer { margin-top: 24px; font-size: 12px; color: #6b7280; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <span>⛳</span>
            <h1>GolfOdds</h1>
        </div>
        <p class="subtitle">Kalshi vs sportsbook outright odds analyzer</p>
        <form id="login-form">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autofocus>
            </div>
            <div class="error" id="error">Incorrect password</div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <div class="footer">Hyder Media</div>
    </div>
    <script>
        const AUTH_KEY = 'golfodds_auth';
        const PASSWORD = 'BIRDIE';
        const form = document.getElementById('login-form');
        const errorEl = document.getElementById('error');

        if (sessionStorage.getItem(AUTH_KEY) === 'authenticated') {
            window.location.href = '/golfodds/';
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            if (password === PASSWORD) {
                sessionStorage.setItem(AUTH_KEY, 'authenticated');
                window.location.href = '/golfodds/';
            } else {
                errorEl.style.display = 'block';
                document.getElementById('password').value = '';
            }
        });
    </script>
</body>
</html>
